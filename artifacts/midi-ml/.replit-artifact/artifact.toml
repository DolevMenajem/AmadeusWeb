kind = "web"
previewPath = "/"
title = "MIDI ML Studio"
version = "1.0.0"
id = "artifacts/midi-ml"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19247

[services.development]
run = "pnpm --filter @workspace/midi-ml run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/midi-ml", "run", "build" ]
publicDir = "artifacts/midi-ml/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19247"
BASE_PATH = "/"
